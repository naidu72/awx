---
- name: Step 1.1 - Prepare all cluster nodes (Common Setup)
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Enable passwordless sudo for pi user
      ansible.builtin.copy:
        dest: /etc/sudoers.d/010_pi-nopasswd
        content: "pi ALL=(ALL) NOPASSWD:ALL\n"
        mode: '0440'

    - name: Turn off active swap
      ansible.builtin.command:
        cmd: swapoff -a
      ignore_errors: true

- name: Step 1.2 - Configure cgroups on Raspberry Pi OS nodes
  hosts:
    - 192.168.0.150
    - 192.168.0.151
    - 192.168.0.152
  become: true
  gather_facts: false
  tasks:
    - name: Remove cgroup_disable=memory from Pi boot params
      ansible.builtin.replace:
        path: /boot/firmware/cmdline.txt
        regexp: 'cgroup_disable=memory'
        replace: ''

    - name: Append cgroup flags to Pi cmdline.txt if missing
      ansible.builtin.lineinfile:
        path: /boot/firmware/cmdline.txt
        backrefs: true
        regexp: '^(.*)(?<!cgroup_enable=memory)$'
        line: '\1 cgroup_enable=cpuset cgroup_memory=1 cgroup_enable=memory'

- name: Step 1.3 - Configure cgroups on Rock64 (Armbian)
  hosts: 192.168.0.154
  become: true
  gather_facts: false
  tasks:
    - name: Append extraargs to Armbian boot params
      ansible.builtin.lineinfile:
        path: /boot/armbianEnv.txt
        regexp: '^extraargs='
        line: 'extraargs=cgroup_enable=cpuset cgroup_memory=1 cgroup_enable=memory'
        state: present