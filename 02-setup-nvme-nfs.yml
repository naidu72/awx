---
- name: Step 2 - Configure NVMe HAT and NFS Server on pi5one
  hosts: 192.168.0.151
  become: true
  tasks:
    - name: Enable PCIe Gen 3 in Raspberry Pi 5 config
      ansible.builtin.lineinfile:
        path: /boot/firmware/config.txt
        line: "{{ item }}"
        state: present
      loop:
        - "dtparam=pciex1"
        - "dtparam=pciex1_gen=3"

    - name: Ensure mount point directory exists
      ansible.builtin.file:
        path: /mnt/nvme
        state: directory
        mode: '0777'

    - name: Mount NVMe drive to /mnt/nvme via fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: "/dev/nvme0n1p1  /mnt/nvme  ext4  defaults,noatime  0  2"
        state: present

    - name: Mount NVMe filesystem directly
      ansible.builtin.command:
        cmd: mount /mnt/nvme
      ignore_errors: true

    - name: Install NFS Kernel Server
      ansible.builtin.apt:
        name: nfs-kernel-server
        state: present
        update_cache: yes

    - name: Configure NFS export directory
      ansible.builtin.lineinfile:
        path: /etc/exports
        line: '/mnt/nvme 192.168.0.0/24(rw,sync,no_subtree_check,no_root_squash)'
        state: present

    - name: Export NFS shares and restart NFS server
      ansible.builtin.shell: exportfs -ra && systemctl restart nfs-kernel-server