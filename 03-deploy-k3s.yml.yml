---
- name: Step 3.1 - Initialize Primary Control Plane (pi5one)
  hosts: 192.168.0.151
  become: true
  tasks:
    - name: Download K3s installation script
      ansible.builtin.get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s_install.sh
        mode: '0755'

    - name: Execute primary K3s installation
      ansible.builtin.command:
        cmd: /tmp/k3s_install.sh server --cluster-init --write-kubeconfig-mode "0644"
        creates: /usr/local/bin/k3s
      environment:
        K3S_TOKEN: "cluster-shared-secret-12345"

    - name: Wait for primary node to reach Ready state
      ansible.builtin.command: k3s kubectl get node
      register: node_check
      until: "'Ready' in node_check.stdout"
      retries: 30
      delay: 5

- name: Step 3.2 - Join Secondary Control Plane Nodes
  hosts:
    - 192.168.0.150
    - 192.168.0.152
  become: true
  tasks:
    - name: Download K3s installation script
      ansible.builtin.get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s_install.sh
        mode: '0755'

    - name: Execute secondary control plane installation
      ansible.builtin.command:
        cmd: /tmp/k3s_install.sh server --server https://192.168.0.151:6443 --write-kubeconfig-mode "0644"
        creates: /usr/local/bin/k3s
      environment:
        K3S_TOKEN: "cluster-shared-secret-12345"

- name: Step 3.3 - Join Worker Node
  hosts: 192.168.0.154
  become: true
  tasks:
    - name: Download K3s installation script
      ansible.builtin.get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s_install.sh
        mode: '0755'

    - name: Execute agent node installation
      ansible.builtin.command:
        cmd: /tmp/k3s_install.sh agent
        creates: /usr/local/bin/k3s
      environment:
        K3S_URL: "https://192.168.0.151:6443"
        K3S_TOKEN: "cluster-shared-secret-12345"