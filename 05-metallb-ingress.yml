---
- name: Step 5 - Deploy MetalLB Load Balancer on K3s Cluster
  hosts: 192.168.0.151
  become: true
  gather_facts: false
  tasks:
    - name: Add MetalLB Helm repository
      kubernetes.core.helm_repository:
        name: metallb
        repo_url: https://metallb.github.io/metallb

    - name: Deploy MetalLB via Helm
      kubernetes.core.helm:
        name: metallb
        chart_ref: metallb/metallb
        release_namespace: kube-system
        kubeconfig: /etc/rancher/k3s/k3s.yaml

    - name: Wait for MetalLB controller deployment to be ready
      ansible.builtin.command:
        cmd: k3s kubectl rollout status deployment/metallb-controller -n kube-system --timeout=300s

    - name: Apply MetalLB IP Address Pool and L2 Advertisement
      ansible.builtin.shell: |
        k3s kubectl apply -f - <<EOF
        apiVersion: metallb.io/v1beta1
        kind: IPAddressPool
        metadata:
          name: local-ip-pool
          namespace: kube-system
        spec:
          addresses:
            - 192.168.0.130-192.168.0.150
        ---
        apiVersion: metallb.io/v1beta1
        kind: L2Advertisement
        metadata:
          name: local-l2-advert
          namespace: kube-system
        spec:
          ipAddressPools:
            - local-ip-pool
        EOF