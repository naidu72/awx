---
- name: Step 5 - Deploy MetalLB Load Balancer on K3s Cluster
  hosts: 192.168.0.151
  become: true
  gather_facts: false
  tasks:
    - name: Add MetalLB Helm repository
      kubernetes.core.helm_repository:
        name: metallb
        repo_url: https://metallb.github.io/metallb

    - name: Deploy MetalLB via Helm
      kubernetes.core.helm:
        name: metallb
        chart_ref: metallb/metallb
        release_namespace: kube-system
        kubeconfig: /etc/rancher/k3s/k3s.yaml

    - name: Wait for MetalLB controller deployment to be ready
      ansible.builtin.command:
        cmd: k3s kubectl rollout status deployment/metallb-controller -n kube-system --timeout=90s

    - name: Configure MetalLB IP Address Pool resource
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        definition:
          apiVersion: metallb.io/v1beta1
          kind: IPAddressPool
          metadata:
            name: local-ip-pool
            namespace: kube-system
          spec:
            addresses:
              - 192.168.0.240-192.168.0.250

    - name: Configure MetalLB L2 Advertisement resource
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        definition:
          apiVersion: metallb.io/v1beta1
          kind: L2Advertisement
          metadata:
            name: local-l2-advert
            namespace: kube-system
          spec:
            ipAddressPools:
              - local-ip-pool