---
- name: Optimize K3s Nodes for Small Storage and Reduce Disk Wear
  hosts: all
  become: true
  gather_facts: true

  tasks:

    - name: Ensure K3s config directory exists
      ansible.builtin.file:
        path: /etc/rancher/k3s
        state: directory
        mode: '0755'

    - name: Configure K3s Kubelet Image Garbage Collection thresholds
      ansible.builtin.blockinfile:
        path: /etc/rancher/k3s/config.yaml
        create: true
        mode: '0644'
        block: |
          kubelet-arg:
            - "image-gc-high-threshold=60"
            - "image-gc-low-threshold=40"

    - name: Ensure [Journal] section header exists in journald.conf
      ansible.builtin.lineinfile:
        path: /etc/systemd/journald.conf
        line: '[Journal]'
        state: present
        create: true
        mode: '0644'

    - name: Configure volatile RAM logging options
      ansible.builtin.lineinfile:
        path: /etc/systemd/journald.conf
        regexp: "^#?{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
        insertafter: '^\[Journal\]'
        state: present
      loop:
        - { key: 'Storage', value: 'volatile' }
        - { key: 'SystemMaxUse', value: '100M' }
        - { key: 'RuntimeMaxUse', value: '100M' }
      notify: Restart Journald

    - name: Create daily cron job to prune unused container images
      ansible.builtin.cron:
        name: "Prune unused K3s containerd images"
        special_time: daily
        job: "/usr/local/bin/k3s crictl rmi --prune >/dev/null 2>&1"

  handlers:
    - name: Restart Journald
      ansible.builtin.systemd:
        name: systemd-journald
        state: restarted