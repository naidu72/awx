---
- name: Report installed versions
  hosts: all
  gather_facts: true
  tasks:
    - name: Get k3s version
      ansible.builtin.command: k3s --version
      register: k3s_ver
      changed_when: false
      failed_when: false

    - name: Get available apt upgrades
      ansible.builtin.command: apt list --upgradable
      register: upgrades
      changed_when: false

    - name: Show summary
      ansible.builtin.debug:
        msg:
          - "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "Kernel: {{ ansible_kernel }}"
          - "Arch: {{ ansible_architecture }}"
          - "Uptime days: {{ (ansible_uptime_seconds / 86400) | round(1) }}"
          - "k3s: {{ k3s_ver.stdout_lines[0] | default('not installed') }}"
          - "Pending upgrades: {{ upgrades.stdout_lines | length - 1 }}"